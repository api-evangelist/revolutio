aid: revolutio
name: Revolutio
description: >-
  Revolutio provides smart structural engineering software and a Hazard API
  (formerly CHECKWIND.API) that delivers site-specific wind, snow, ice, and
  seismic load parameters for structural engineering and construction projects.
  The API is trusted by over 750 companies and 5000 users worldwide across
  construction, fabrication, power distribution, signage, structural engineering,
  and telecommunications. It covers 40+ countries and supports standards
  including AS/NZS 1170.2, AS 4055, and ASCE 7.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Engineering
  - Hazard
  - Weather
  - Structural Engineering
  - Wind Analysis
  - Construction
url: >-
