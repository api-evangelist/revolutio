naftiko: 1.0.0-alpha2
info:
  label: Revolutio Structural Engineering Hazard Assessment
  description: Workflow capability for comprehensive structural engineering site hazard assessment. Enables engineers and
    construction software to retrieve wind, snow, ice, and seismic design parameters for any global site using Revolutio's
    Hazard API, supporting AS/NZS 1170.2, AS 4055, ASCE 7, and other international standards.
  tags:
  - Revolutio
  - Structural Engineering
  - Wind Analysis
  - Construction
  - Hazard Assessment
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    REVOLUTIO_API_KEY: REVOLUTIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: revolutio
    baseUri: https://api.revolutio.com.au
    description: Revolutio Hazard API for site-specific wind, snow, ice, and seismic analysis
    authentication:
      type: apikey
      key: apiKey
      value: '{{REVOLUTIO_API_KEY}}'
      placement: query
    resources:
    - name: wind-analysis
      path: /asnzs1170/wind
      description: Wind hazard analysis per AS/NZS 1170.2 and ASCE 7
      operations:
      - name: get-wind-hazard
        method: GET
        description: Get site-specific wind hazard parameters
        inputParameters:
        - name: latitude
          in: query
          type: number
          required: true
          description: Site latitude in decimal degrees
        - name: longitude
          in: query
          type: number
          required: true
          description: Site longitude in decimal degrees
        - name: h
          in: query
          type: number
          required: false
          description: Structure height in metres
        - name: units
          in: query
          type: string
          required: false
          description: 'Output units: metric or imperial'
        - name: advancedDetection
          in: query
          type: boolean
          required: false
          description: Enable ML terrain detection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: snow-analysis
      path: /asnzs1170/snow
      description: Snow and ice loading analysis
      operations:
      - name: get-snow-hazard
        method: GET
        description: Get site-specific snow and ice loading parameters
        inputParameters:
        - name: latitude
          in: query
          type: number
          required: true
          description: Site latitude in decimal degrees
        - name: longitude
          in: query
          type: number
          required: true
          description: Site longitude in decimal degrees
        - name: h
          in: query
          type: number
          required: false
          description: Structure height in metres
        - name: units
          in: query
          type: string
          required: false
          description: 'Output units: metric or imperial'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: seismic-analysis
      path: /asnzs1170/seismic
      description: Seismic hazard analysis
      operations:
      - name: get-seismic-hazard
        method: GET
        description: Get site-specific seismic hazard parameters
        inputParameters:
        - name: latitude
          in: query
          type: number
          required: true
          description: Site latitude in decimal degrees
        - name: longitude
          in: query
          type: number
          required: true
          description: Site longitude in decimal degrees
        - name: units
          in: query
          type: string
          required: false
          description: 'Output units: metric or imperial'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: combined-hazard
      path: /asnzs1170/combined
      description: Combined multi-hazard analysis
      operations:
      - name: get-combined-hazard
        method: GET
        description: Get all hazard parameters (wind, snow, ice, seismic) for a site
        inputParameters:
        - name: latitude
          in: query
          type: number
          required: true
          description: Site latitude in decimal degrees
        - name: longitude
          in: query
          type: number
          required: true
          description: Site longitude in decimal degrees
        - name: h
          in: query
          type: number
          required: false
          description: Structure height in metres
        - name: units
          in: query
          type: string
          required: false
          description: 'Output units: metric or imperial'
        - name: advancedDetection
          in: query
          type: boolean
          required: false
          description: Enable ML terrain detection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: revolutio-engineering-api
    description: Unified REST API for structural engineering site hazard assessment.
    resources:
    - path: /v1/sites/wind
      name: site-wind
      description: Wind hazard parameters for a construction site
      operations:
      - method: GET
        name: get-site-wind
        description: Retrieve wind region, terrain category, and design wind speed for a site
        call: revolutio.get-wind-hazard
        with:
          latitude: rest.latitude
          longitude: rest.longitude
          h: rest.h
          units: rest.units
          advancedDetection: rest.advanced_detection
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/snow
      name: site-snow
      description: Snow and ice loading parameters for a construction site
      operations:
      - method: GET
        name: get-site-snow
        description: Retrieve snow region, elevation class, and ground load for a site
        call: revolutio.get-snow-hazard
        with:
          latitude: rest.latitude
          longitude: rest.longitude
          h: rest.h
          units: rest.units
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/seismic
      name: site-seismic
      description: Seismic hazard parameters for a construction site
      operations:
      - method: GET
        name: get-site-seismic
        description: Retrieve seismic hazard class and site classification
        call: revolutio.get-seismic-hazard
        with:
          latitude: rest.latitude
          longitude: rest.longitude
          units: rest.units
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/assessment
      name: site-assessment
      description: Comprehensive multi-hazard site assessment
      operations:
      - method: GET
        name: get-site-assessment
        description: Get all hazard parameters (wind, snow, ice, seismic) for a complete site assessment
        call: revolutio.get-combined-hazard
        with:
          latitude: rest.latitude
          longitude: rest.longitude
          h: rest.h
          units: rest.units
          advancedDetection: rest.advanced_detection
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: revolutio-engineering-mcp
    transport: http
    description: MCP server for AI-assisted structural engineering hazard assessment.
    tools:
    - name: get-site-wind-hazard
      description: Get wind hazard parameters for a specific geographic location. Returns wind region, terrain category, topographic
        class, and design wind speed per AS/NZS 1170.2 or ASCE 7.
      hints:
        readOnly: true
        openWorld: true
      call: revolutio.get-wind-hazard
      with:
        latitude: tools.latitude
        longitude: tools.longitude
        h: tools.structure_height
        units: tools.units
        advancedDetection: tools.advanced_detection
      outputParameters:
      - type: object
        mapping: $.
    - name: get-site-snow-hazard
      description: Get snow and ice loading parameters for a site. Returns snow region, elevation class, snow ground load,
        and ice region classification.
      hints:
        readOnly: true
        openWorld: true
      call: revolutio.get-snow-hazard
      with:
        latitude: tools.latitude
        longitude: tools.longitude
        h: tools.structure_height
        units: tools.units
      outputParameters:
      - type: object
        mapping: $.
    - name: get-site-seismic-hazard
      description: Get seismic hazard parameters for a site. Returns hazard class, site class, and probability factor.
      hints:
        readOnly: true
        openWorld: true
      call: revolutio.get-seismic-hazard
      with:
        latitude: tools.latitude
        longitude: tools.longitude
        units: tools.units
      outputParameters:
      - type: object
        mapping: $.
    - name: get-complete-site-assessment
      description: Get a comprehensive multi-hazard site assessment covering wind, snow, ice, and seismic parameters in a
        single API call. Ideal for full structural engineering site evaluations.
      hints:
        readOnly: true
        openWorld: true
      call: revolutio.get-combined-hazard
      with:
        latitude: tools.latitude
        longitude: tools.longitude
        h: tools.structure_height
        units: tools.units
        advancedDetection: tools.advanced_detection
      outputParameters:
      - type: object
        mapping: $.
